<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/colors.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/typography.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/base.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/styles.css">
  <script src="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/_ds_bundle.js"></script>
  <style>
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    body { margin: 0; }
  </style>
</helmet>

<div style="background:var(--surface-page); min-height:100vh; font-family:var(--font-body);">

  <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.NavBar" links="{{ navLinks }}" active-href="publication.dc.html" hint-size="100%,64px"></x-import>

  <section style="position:relative; overflow:hidden; padding:64px 48px 40px; background:var(--navy-900);">
    <div style="position:absolute; inset:0; z-index:0;">
      <img src="assets/hero-bg.jpg" alt="STREAM Lab building" style="width:100%; height:100%; object-fit:cover; display:block; background:var(--navy-800);">
    </div>
    <div style="position:absolute; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg, rgba(0,23,61,0.90) 0%, rgba(0,32,91,0.84) 100%);"></div>
    <div style="position:relative; z-index:2; max-width:1240px; margin:0 auto; display:flex; flex-direction:column; gap:12px;">
      <h1 style="font-family:var(--font-display); font-weight:700; font-size:var(--text-3xl); color:#fff; margin:0;">Publication</h1>
    </div>
  </section>

  <main style="max-width:1240px; margin:0 auto; padding:64px 48px; display:flex; flex-direction:column; gap:56px;">

    <section style="display:flex; flex-direction:column; gap:20px;">
      <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.Card" hint-size="100%,340px">
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap;">
            <h2 style="font-family:var(--font-display); font-size:var(--text-lg); color:var(--text-primary); margin:0;">Cumulative publications by year</h2>
            <span style="font-family:var(--font-mono); font-size:var(--text-sm); color:var(--text-tertiary);">{{ chartTotal }} papers total</span>
          </div>
          <svg viewBox="0 0 1100 320" style="width:100%; height:300px; overflow:visible;">
            <defs>
              <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="var(--blue-600)" stop-opacity="0.28"></stop>
                <stop offset="100%" stop-color="var(--blue-600)" stop-opacity="0"></stop>
              </linearGradient>
            </defs>
            <line x1="56" x2="56" y1="20" y2="230" stroke="var(--border-default)" stroke-width="1.5"></line>
            <line x1="56" x2="1080" y1="230" y2="230" stroke="var(--border-default)" stroke-width="1.5"></line>
            <sc-for list="{{ gridLines }}" as="gl" hint-placeholder-count="4">
              <line x1="56" x2="1080" y1="{{ gl.y }}" y2="{{ gl.y }}" stroke="var(--border-subtle)" stroke-width="1"></line>
              <line x1="49" x2="56" y1="{{ gl.y }}" y2="{{ gl.y }}" stroke="var(--border-default)" stroke-width="1.5"></line>
              <foreignObject x="0" y="{{ gl.labelY }}" width="38" height="16">
                <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:var(--font-mono); font-size:12px; line-height:16px; color:var(--text-tertiary); text-align:right;">{{ gl.label }}</div>
              </foreignObject>
            </sc-for>
            <path d="{{ chartAreaPath }}" fill="url(#areaFill)" stroke="none"></path>
            <path d="{{ chartLinePath }}" fill="none" stroke="var(--blue-600)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
            <sc-for list="{{ chartPoints }}" as="p" hint-placeholder-count="7">
              <circle cx="{{ p.x }}" cy="{{ p.y }}" r="4.5" fill="var(--surface-card)" stroke="var(--blue-600)" stroke-width="2.5"></circle>
              <line x1="{{ p.x }}" x2="{{ p.x }}" y1="230" y2="237" stroke="var(--border-default)" stroke-width="1.5"></line>
              <foreignObject x="{{ p.labelX }}" y="245" width="56" height="18">
                <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:var(--font-mono); font-size:12px; line-height:18px; color:var(--text-tertiary); text-align:center;">{{ p.year }}</div>
              </foreignObject>
            </sc-for>
            <text x="568" y="290" font-family="var(--font-body)" font-size="13" font-weight="600" fill="var(--text-secondary)" text-anchor="middle">Year</text>
            <text x="18" y="125" font-family="var(--font-body)" font-size="13" font-weight="600" fill="var(--text-secondary)" text-anchor="middle" transform="rotate(-90 18 125)">Cumulative papers</text>
          </svg>
        </div>
      </x-import>
      <p style="margin:0; font-family:var(--font-body); font-size:var(--text-sm); color:var(--text-tertiary);">†: Co-first author &nbsp;·&nbsp; *: Corresponding author</p>
    </section>

    <section style="display:flex; flex-direction:column; gap:32px;">
      <h2 style="font-family:var(--font-display); font-size:var(--text-xl); color:var(--text-primary); margin:0;">Papers</h2>

      <sc-for list="{{ paperGroups }}" as="group" hint-placeholder-count="4">
        <div style="display:flex; flex-direction:column; gap:0;">
          <h3 style="font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--text-primary); text-transform:uppercase; letter-spacing:var(--tracking-wide); margin:0 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border-subtle);">{{ group.year }}</h3>
          <sc-for list="{{ group.items }}" as="pub" hint-placeholder-count="2">
            <div style="display:flex; gap:18px; padding:18px 0; border-bottom:1px solid var(--border-subtle); align-items:flex-start;">
              <span style="font-family:var(--font-mono); font-size:var(--text-sm); color:var(--text-tertiary); width:22px; flex:none; padding-top:3px;">{{ pub.num }}</span>
              <div style="display:flex; flex-direction:column; gap:8px; flex:1;">
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                  <sc-for list="{{ pub.fieldsStyled }}" as="f" hint-placeholder-count="1">
                    <span style="align-self:flex-start; font-family:var(--font-body); font-size:var(--text-2xs); font-weight:600; letter-spacing:var(--tracking-wide); text-transform:uppercase; padding:0.3rem 0.65rem; border-radius:var(--radius-pill); background:{{ f.bg }}; color:{{ f.color }};">{{ f.label }}</span>
                  </sc-for>
                </div>
                <p style="margin:0; font-family:var(--font-body); font-size:var(--text-md); line-height:var(--leading-snug); color:var(--text-primary);">{{ pub.title }}</p>
                <p style="margin:0; font-family:var(--font-body); font-size:var(--text-sm); color:var(--text-secondary);">
                  <sc-for list="{{ pub.authorParts }}" as="ap" hint-placeholder-count="1">
                    <sc-if value="{{ ap.bold }}" hint-placeholder-val="{{ false }}">
                      <strong style="text-decoration:underline; color:var(--text-primary);">{{ ap.text }}</strong>
                    </sc-if>
                    <sc-if value="{{ ap.plain }}" hint-placeholder-val="{{ true }}">
                      <span>{{ ap.text }}</span>
                    </sc-if>
                  </sc-for>
                </p>
                <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                  <p style="margin:0; font-family:var(--font-mono); font-size:var(--text-xs); color:var(--text-tertiary);">{{ pub.venue }}</p>
                  <sc-if value="{{ pub.doi }}" hint-placeholder-val="{{ false }}">
                    <a href="{{ pub.doiUrl }}" target="_blank" rel="noopener" style="font-family:var(--font-body); font-size:var(--text-xs); font-weight:600; color:var(--brand-primary); text-decoration:none; border:1px solid var(--border-default); border-radius:var(--radius-pill); padding:0.2rem 0.7rem;">View paper ↗</a>
                  </sc-if>
                </div>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-for>
    </section>

  </main>

  <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.Footer" hint-size="100%,140px"></x-import>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const FIELD_STYLE = {
  'First-principles calculation': { bg: 'var(--blue-100)', color: 'var(--brand-primary)' },
  'Machine learning potential': { bg: 'var(--fog-100)', color: 'var(--fog-700)' },
  'Multi-scale simulation': { bg: 'var(--sage-100)', color: 'var(--sage-600)' },
  'Generative AI for materials': { bg: 'var(--gold-200)', color: 'var(--gold-700)' },
};

// Current lab members whose author-list occurrences should be bolded + underlined
const LAB_MEMBER_REGEX = /(Jung, J\.?|Bak, H\.?|Ahn, H\.?)/g;

function splitAuthors(str) {
  const parts = [];
  let last = 0;
  let m;
  LAB_MEMBER_REGEX.lastIndex = 0;
  while ((m = LAB_MEMBER_REGEX.exec(str))) {
    if (m.index > last) parts.push({ text: str.slice(last, m.index), bold: false, plain: true });
    parts.push({ text: m[0], bold: true, plain: false });
    last = m.index + m[0].length;
  }
  if (last < str.length) parts.push({ text: str.slice(last), bold: false, plain: true });
  return parts;
}

function withComputedFields(items) {
  return items.map(it => ({
    ...it,
    fieldsStyled: it.fields.map(f => ({ label: f, bg: FIELD_STYLE[f].bg, color: FIELD_STYLE[f].color })),
    authorParts: splitAuthors(it.authors),
    doiUrl: it.doi ? `https://doi.org/${it.doi}` : '',
  }));
}

class Component extends DCLogic {
  renderVals() {
    const rawGroups = [
      { year: 'Submitted', items: [
        { fields: ['First-principles calculation'], title: 'Decoupling of topological surface states from catalytic activity in the chiral topological semimetal PtGa', authors: 'Jung, J.\u2020, Jung, J.\u2020, Kim, H., Lee, Y., Lee, J., Lee, J. H., Chung, D. Y., Han, S., Kim, C., Mun, B. S. & Yoo, S. J.*', venue: 'Submitted', doi: '' },
        { fields: ['First-principles calculation'], title: 'Field-free ovonic threshold switching at the glass transition with transient and inhomogeneous covalent-to-metavalent conversion', authors: 'Kim, D.\u2020*, Miao, N.\u2020, Jung, J.\u2020, Jung, T. S.\u2020, Zhou, Y., Lee, S., Sch\u00f6n, C.-F., Yu, Y., Kim, J. H.*, & Han, S.*', venue: 'Submitted', doi: '' },
      ]},
      { year: '2026', items: [
        { fields: ['Generative AI for materials'], title: 'Are diffusion models ready for materials discovery in unexplored chemical space?', authors: 'Kim, S., Jeon, G., Hwang, S., Lee, J., Jung, J., Han, S., & Kang, S.*', venue: 'Patterns 7, 101537', doi: '10.1016/j.patter.2026.101537' },
        { fields: ['Machine learning potential'], title: 'Reactive machine learning interatomic potentials for chemistry and materials science', authors: 'Kim, J., Cho, H., Jeon, H., Jung, J.*, & Han, S.*', venue: 'Chemical Reviews 126, 4467\u20134510', doi: '10.1021/acs.chemrev.5c00728' },
      ]},
      { year: '2025', items: [
        { fields: ['First-principles calculation'], title: 'Nonmelting disordering facilitated by electron delocalization', authors: 'Kim, D.\u2020, Kim, S.\u2020, Jung, J.\u2020, Kim, J., Choi, S., Sch\u00f6n, C.-F., Lee, C., Lim, H., Jeong, J., Yu, S., Jeong, Y., Lee, H., Kim, S., Nam, D., Eom, I., Jang, D., Kim, K. S., Im, S., Han, S.*, Kim, H.*, & Cho, M.-H.*', venue: 'ACS Nano 19, 9317\u20139326', doi: '' },
      ]},
      { year: '2024', items: [
        { fields: ['Multi-scale simulation'], title: 'Modified activation-relaxation technique (ARTn) method tuned for efficient identification of transition states in surface reactions', authors: 'Jung, J., An, H., Lee, J. & Han, S.*', venue: 'J. Chem. Theory Comput. 20, 8024', doi: '' },
        { fields: ['Machine learning potential', 'Multi-scale simulation'], title: 'Disorder-dependent Li diffusion in Li6PS5Cl investigated by machine learning potential', authors: 'Lee, J.\u2020, Ju, S.\u2020, Hwang, S., You, J., Jung, J., Kang, Y.* & Han, S.*', venue: 'ACS Appl. Mater. Interface 16, 46442', doi: '' },
        { fields: ['Generative AI for materials', 'Machine learning potential'], title: 'Predicting melting temperature of inorganic crystals via crystal graph neural network enhanced by transfer learning', authors: 'Kim, J.\u2020, Jung, J.\u2020, Kim, S. & Han, S.*', venue: 'Comput. Mater. Sci. 234, 112783', doi: '' },
      ]},
      { year: '2023', items: [
        { fields: ['Multi-scale simulation', 'Machine learning potential'], title: 'Electrochemical degradation of Pt3Co nanoparticles investigated by off-lattice kinetic Monte Carlo simulations with machine-learned potentials', authors: 'Jung, J.\u2020, Ju, S.\u2020, Kim, P.-H., Hong, D., Jeong, W., Lee, J., Han, S.* & Kang, S.*', venue: 'ACS Catal. 13, 16078\u201316087', doi: '' },
        { fields: ['Machine learning potential'], title: 'Applications and training sets of machine learning potentials', authors: 'Hong, C.\u2020, Kim, J.\u2020, Kim, J., Jung, J., Ju, S., Choi, J. M. & Han, S.*', venue: 'Sci. Technol. Adv. Mater.: Methods 3, 2269948', doi: '' },
        { fields: ['Machine learning potential', 'First-principles calculation'], title: 'Stability and equilibrium structures of unknown ternary metal oxides explored by machine-learned potentials', authors: 'Hwang, S., Jung, J., Hong, C., Jeong, W., Kang, S.* & Han, S.*', venue: 'J. Am. Chem. Soc. 145, 19378\u201319386 \u2014 Supplementary cover', doi: '' },
      ]},
      { year: '2022', items: [
        { fields: ['Multi-scale simulation'], title: 'Atomistic kinetic Monte Carlo simulation on atomic layer deposition of TiN thin film', authors: 'Kim, S., An, H., Oh, S., Jung, J., Kim, B., Nam, S. K. & Han, S.*', venue: 'Comput. Mater. Sci. 231, 111620', doi: '' },
      ]},
      { year: '2021', items: [
        { fields: ['Machine learning potential'], title: 'Metadynamics sampling in atomic environment space for collecting training data for machine learning potentials', authors: 'Yoo, D.\u2020, Jung, J.\u2020, Jeong, W. & Han, S.*', venue: 'npj Comput. Mater. 7, 131', doi: '' },
      ]},
      { year: '2020', items: [
        { fields: ['Machine learning potential'], title: 'Training machine-learning potentials for crystal structure prediction using disordered structures', authors: 'Hong, C.\u2020, Choi, J. M.\u2020, Jeong, W.\u2020, Kang, S.\u2020, Ju, S., Lee, K., Jung, J., Youn, Y. & Han, S.*', venue: 'Phys. Rev. B 102, 224104', doi: '' },
        { fields: ['First-principles calculation'], title: 'AMP2: A fully automated program for ab initio calculations of crystalline materials', authors: 'Youn, Y., Lee, M., Hong, C., Kim, D., Kim, S., Jung, J., Kim, Y. & Han, S.*', venue: 'Comput. Phys. Commun. 256, 107450', doi: '' },
        { fields: ['Machine learning potential'], title: 'Efficient atomic-resolution uncertainty estimation for neural network potentials using a replica ensemble', authors: 'Jeong, W., Yoo, D., Lee, K., Jung, J. & Han, S.*', venue: 'J. Phys. Chem. Lett. 11, 6090\u20136096 \u2014 Supplementary cover', doi: '' },
      ]},
    ];

    // Cumulative numbering starting at 1 for the oldest paper, counting forward
    // (mutates shared item objects, so both the reversed pass below and rawGroups see the result)
    let counter = 0;
    rawGroups.slice().reverse().forEach(g => { g.items.slice().reverse().forEach(it => { counter += 1; it.num = counter; }); });

    const paperGroups = rawGroups.map(g => ({ year: g.year, items: withComputedFields(g.items) }));

    // Cumulative-by-year chart (published papers only, excludes "Submitted")
    const yearCounts = [
      { year: '2020', count: 3 },
      { year: '2021', count: 1 },
      { year: '2022', count: 1 },
      { year: '2023', count: 3 },
      { year: '2024', count: 3 },
      { year: '2025', count: 1 },
      { year: '2026', count: 2 },
    ];
    let running = 0;
    const cumulative = yearCounts.map(y => { running += y.count; return { year: y.year, total: running }; });
    const chartTotal = running;

    const W = 1100, H = 320, left = 56, right = 20, top = 20, bottom = 90;
    const innerW = W - left - right, innerH = H - top - bottom;
    const maxVal = Math.max(...cumulative.map(c => c.total));
    const n = cumulative.length;
    const xFor = i => left + (n === 1 ? 0 : (i / (n - 1)) * innerW);
    const yFor = v => top + innerH - (v / maxVal) * innerH;

    const chartPoints = cumulative.map((c, i) => ({ x: xFor(i), y: yFor(c.total), year: c.year, labelX: xFor(i) - 28 }));
    const linePath = chartPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
    const areaPath = `M ${chartPoints[0].x} ${top + innerH} ` +
      chartPoints.map(p => `L ${p.x} ${p.y}`).join(' ') +
      ` L ${chartPoints[n - 1].x} ${top + innerH} Z`;

    const gridSteps = 4;
    const gridLines = Array.from({ length: gridSteps + 1 }, (_, i) => {
      const val = Math.round((maxVal / gridSteps) * (gridSteps - i));
      const y = top + (innerH / gridSteps) * i;
      return { y, label: String(val), labelY: y - 8 };
    });

    return {
      navLinks: [
        { label: 'Home', href: 'index.dc.html' },
        { label: 'Research', href: 'research.dc.html' },
        { label: 'Members', href: 'members.dc.html' },
        { label: 'Publication', href: 'publication.dc.html' },
        { label: 'Presentation', href: 'presentation.dc.html' },
        { label: 'News', href: 'news.dc.html' },
        { label: 'Contact', href: 'contact.dc.html' },
      ],
      paperGroups,
      chartTotal,
      chartAreaPath: areaPath,
      chartLinePath: linePath,
      chartPoints,
      gridLines,
    };
  }
}

</script>
</body>
</html>
