<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/colors.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/typography.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/base.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/styles.css">
  <script src="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/_ds_bundle.js"></script>
  <style>
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    body { margin: 0; }
  </style>
</helmet>

<div style="background:var(--surface-page); min-height:100vh; font-family:var(--font-body);">

  <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.NavBar" links="{{ navLinks }}" active-href="news.html" hint-size="100%,64px"></x-import>

  <section style="position:relative; overflow:hidden; padding:64px 48px 40px; background:var(--navy-900);">
    <div style="position:absolute; inset:0; z-index:0;">
      <img src="assets/hero-bg.jpg" alt="STREAM Lab building" style="width:100%; height:100%; object-fit:cover; display:block; background:var(--navy-800);">
    </div>
    <div style="position:absolute; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg, rgba(0,23,61,0.90) 0%, rgba(0,32,91,0.84) 100%);"></div>
    <div style="position:relative; z-index:2; max-width:1240px; margin:0 auto; display:flex; flex-direction:column; gap:12px;">
      <h1 style="font-family:var(--font-display); font-weight:700; font-size:var(--text-3xl); color:#fff; margin:0;">News</h1>
    </div>
  </section>

  <main style="max-width:900px; margin:0 auto; padding:64px 48px;">
    <div style="position:relative; display:flex; flex-direction:column; gap:0;">
      <div style="position:absolute; left:113px; top:8px; bottom:8px; width:2px; background:var(--border-subtle);"></div>
      <sc-for list="{{ newsItems }}" as="item" hint-placeholder-count="6">
        <div style="position:relative; display:grid; grid-template-columns:96px 36px 1fr; gap:0; padding:22px 0;">
          <span style="font-family:var(--font-mono); font-size:var(--text-xs); color:var(--text-tertiary); padding-top:2px;">{{ item.date }}</span>
          <div style="display:flex; justify-content:center;">
            <div style="width:12px; height:12px; border-radius:50%; background:var(--brand-primary); border:2px solid var(--surface-page); box-shadow:0 0 0 2px var(--border-default); margin-top:4px;"></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <h3 style="margin:0; font-family:var(--font-display); font-size:var(--text-md); color:var(--text-primary);">{{ item.title }}</h3>
            <p style="margin:0; font-family:var(--font-body); font-size:var(--text-sm); color:var(--text-secondary); line-height:var(--leading-normal);">{{ item.excerpt }}</p>
            <sc-if value="{{ item.hasImage }}" hint-placeholder-val="{{ false }}">
              <img src="assets/{{ item.imageId }}.jpg" alt="{{ item.title }}" style="width:100%; max-width:420px; height:220px; object-fit:cover; border-radius:12px; margin-top:6px; display:block; background:var(--blue-100);">
            </sc-if>
          </div>
        </div>
      </sc-for>
    </div>
  </main>

  <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.Footer" hint-size="100%,140px"></x-import>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      navLinks: [
        { label: 'Home', href: 'index.html' },
        { label: 'Research', href: 'research.html' },
        { label: 'Members', href: 'members.html' },
        { label: 'Publication', href: 'publication.html' },
        { label: 'Presentation', href: 'presentation.html' },
        { label: 'News', href: 'news.html' },
        { label: 'Contact', href: 'contact.html' },
      ],
      newsItems: [
        { date: '2026.03.19', title: 'Invited seminar at MSE of PNU', excerpt: 'AI-driven atomistic simulation: from property prediction to long-timescale behavior analysis — invited seminar at the Dept. of Materials Science and Engineering, Pusan National University', hasImage: true, imageId: 'news_pnu' },
        { date: '2026.03.02', title: '2026 Spring M.S. course student', excerpt: 'B.S. Hyeongeun Bak joined the lab as an M.S. student, affiliated with both KICET and UNIST. Welcome!', hasImage: false },
        { date: '2026.02.24', title: 'Seminar with Prof. Byungjo Kim (UNIST)', excerpt: 'Prof. Byungjo Kim presented a seminar titled "Leveraging Computational Science for Advanced Semiconductor Process Design" at KICET. Thanks!', hasImage: true, imageId: 'news_byungjo' },
        { date: '2026.01.22', title: 'Invited presentation at 2026 Computational Material Science Winter Symposium', excerpt: 'Korean Institute of Metals and Materials, Pohang (Korea), Jan. 23–25', hasImage: true },
        { date: '2026.01.05', title: '2026 Q1 Research Trainee', excerpt: 'Mr. Hyeonseung Ahn (UNIST) joined the lab as a research trainee for six months. Welcome!', hasImage: false },
        { date: '2025.11.03', title: '2025 Q3 Research Intern', excerpt: 'M.S. Yeojin Kim joined the lab as a research intern for a year. Welcome!', hasImage: false },
        { date: '2025.03.04', title: 'Beginning', excerpt: 'Ph.D. Jisu Jung has been a researcher at KICET since 2025.', hasImage: true, imageId: 'hero-bg'},
      ],
    };
  }
}

</script>
</body>
</html>
