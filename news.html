<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/colors.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/typography.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/base.css">
  <link rel="stylesheet" href="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/styles.css">
  <link rel="stylesheet" href="responsive.css">
  <script src="_ds/stream-lab-design-system-0015c877-ea22-46f8-a6cc-cc3e79a1431c/_ds_bundle.js"></script>
  <style>
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    body { margin: 0; }
  </style>
</helmet>

<div style="background:var(--surface-page); min-height:100vh; font-family:var(--font-body);" data-screen-label="News">

  <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.NavBar" links="{{ navLinks }}" active-href="news.html" brand-href="index.html" logo-src="assets/logo.png" hint-size="100%,64px"></x-import>

  <section class="hero-pad-sm container-px" style="position:relative; overflow:hidden; padding:64px 48px 40px; background:var(--navy-900);">
    <div style="position:absolute; inset:0; z-index:0;">
      <img src="assets/hero-bg.jpg" alt="STREAM Lab building" style="width:100%; height:100%; object-fit:cover; display:block; background:var(--navy-800);">
    </div>
    <div style="position:absolute; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg, rgba(0,23,61,0.90) 0%, rgba(0,32,91,0.84) 100%);"></div>
    <div style="position:relative; z-index:2; max-width:1240px; margin:0 auto; display:flex; flex-direction:column; gap:12px;">
      <h1 class="hero-title-3xl" style="font-family:var(--font-display); font-weight:700; font-size:var(--text-3xl); color:#fff; margin:0;">News</h1>
    </div>
  </section>

  <main class="container-px" style="max-width:900px; margin:0 auto; padding:64px 48px;">
    <div style="position:relative; display:flex; flex-direction:column; gap:0;">
      <div class="news-rail" style="position:absolute; left:113px; top:8px; bottom:8px; width:2px; background:var(--border-subtle);"></div>
      <sc-for list="{{ newsItems }}" as="item" hint-placeholder-count="6">
        <div class="news-row" style="position:relative; display:grid; grid-template-columns:96px 36px 1fr; gap:0; padding:22px 0;">
          <span class="news-date-col" style="font-family:var(--font-mono); font-size:var(--text-xs); color:var(--text-tertiary); padding-top:2px;">{{ item.date }}</span>
          <div class="news-dot-col" style="display:flex; justify-content:center;">
            <div style="width:12px; height:12px; border-radius:50%; background:var(--brand-primary); border:2px solid var(--surface-page); box-shadow:0 0 0 2px var(--border-default); margin-top:4px;"></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <h3 style="margin:0; font-family:var(--font-display); font-size:var(--text-md); color:var(--text-primary);">{{ item.title }}</h3>
            <p style="margin:0; font-family:var(--font-body); font-size:var(--text-sm); color:var(--text-secondary); line-height:var(--leading-normal);">{{ item.excerpt }}</p>
            <sc-if value="{{ item.hasImage }}" hint-placeholder-val="{{ false }}">
              <div onClick="{{ item.openLightbox }}" style="width:100%; max-width:420px; height:220px; border-radius:12px; margin-top:6px; overflow:hidden; background:var(--blue-100); cursor:zoom-in;">
                <image-slot id="{{ item.imageId }}" src="{{ item.imageSrc }}" shape="rect" fit="cover" placeholder="Drop a photo" style="width:100%; height:100%;"></image-slot>
              </div>
            </sc-if>
            <sc-if value="{{ item.hasLink }}" hint-placeholder-val="{{ false }}">
              <a href="{{ item.link }}" target="_blank" rel="noopener" style="display:flex; flex-direction:column; margin-top:6px; max-width:420px; width:100%; border:1px solid var(--border-subtle); border-radius:12px; overflow:hidden; text-decoration:none; background:var(--surface-card); box-shadow:var(--shadow-sm); transition:box-shadow var(--duration-base) var(--ease-standard);" style-hover="box-shadow:var(--shadow-md);">
                <img src="{{ item.linkThumbnail }}" alt="{{ item.title }} link preview" style="width:100%; height:220px; object-fit:cover; display:block; background:var(--surface-sunken);">
                <div style="display:flex; flex-direction:column; gap:2px; padding:10px 14px; min-width:0;">
                  <span style="font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-tertiary); letter-spacing:var(--tracking-wide);">{{ item.linkDomain }}</span>
                  <span style="font-family:var(--font-body); font-size:var(--text-sm); font-weight:600; color:var(--brand-primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ item.link }} ↗</span>
                </div>
              </a>
            </sc-if>
          </div>
        </div>
      </sc-for>
    </div>

    <sc-if value="{{ lightboxSrc }}" hint-placeholder-val="{{ false }}">
      <div onClick="{{ closeLightbox }}" style="position:fixed; inset:0; z-index:1000; background:rgba(0,23,61,0.88); display:flex; align-items:center; justify-content:center; padding:32px; cursor:zoom-out;">
        <img src="{{ lightboxSrc }}" alt="Expanded news photo" style="max-width:min(1100px, 92vw); max-height:88vh; width:auto; height:auto; border-radius:8px; box-shadow:var(--shadow-lg); object-fit:contain;">
        <button type="button" onClick="{{ closeLightbox }}" aria-label="Close" style="position:absolute; top:24px; right:24px; width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,0.14); color:#fff; font-size:22px; line-height:1; cursor:pointer;">×</button>
      </div>
    </sc-if>
  </main>

  <x-import component-from-global-scope="STREAMLabDesignSystem_0015c8.Footer" hint-size="100%,140px"></x-import>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { newsRaw: null, lightboxSrc: null };

  async componentDidMount() {
    const mod = await import('./news-data.js');
    this.setState({ newsRaw: mod.NEWS_ITEMS, linkThumbnailUrl: mod.linkThumbnailUrl, linkDomain: mod.linkDomain });
  }

  hideLinkThumb = (e) => {
    e.currentTarget.style.display = 'none';
  };

  openLightbox = (src) => {
    this.setState({ lightboxSrc: src });
  };

  closeLightbox = () => {
    this.setState({ lightboxSrc: null });
  };

  renderVals() {
    const { newsRaw, linkThumbnailUrl, linkDomain } = this.state;

    const newsItems = (newsRaw || []).map(n => ({
      ...n,
      hasImage: !!n.imageSrc,
      hasLink: !!n.link,
      linkThumbnail: n.link && linkThumbnailUrl ? linkThumbnailUrl(n.link) : '',
      linkDomain: n.link && linkDomain ? linkDomain(n.link) : '',
      openLightbox: () => this.openLightbox(n.imageSrc),
    }));

    return {
      navLinks: [
        { label: 'Home', href: 'index.html' },
        { label: 'Research', href: 'research.html' },
        { label: 'Members', href: 'members.html' },
        { label: 'Publication', href: 'publication.html' },
        { label: 'Presentation', href: 'presentation.html' },
        { label: 'News', href: 'news.html' },
        { label: 'Contact', href: 'contact.html' },
      ],
      newsItems,
      hideLinkThumb: this.hideLinkThumb,
      lightboxSrc: this.state.lightboxSrc,
      closeLightbox: this.closeLightbox,
    };
  }
}

</script>
</body>
</html>
